syntax = "proto3";

package message;

import "google/protobuf/empty.proto";
import "net.proto";
import "minion.proto";


// Payload nested inside SignedMessage.data (see SignedMessage).
message MessageData {
  bytes recipient_id = 1;
  oneof m {
    minion.Register minion_register = 2;
    net.HolePunchParameters hole_punch = 3;
    net.IPAddr listen = 4;
  };
  // True when the sender already had the recipient peer id in its local trust store when signing.
  // False on first contact: include sender_cert on outbound signed messages so the peer can cache the sender.
  bool has_recipient_cert = 5;
};

enum SendMessageStatus {
  OK = 0;
  REJECTED = 1;
  DEST_NOT_FOUND = 2;
  FAILED = 3;
};

message SignedMessage {
  bytes sender_id = 1;
  bytes signature = 2;
  // Optional DER leaf cert matching sender_id. Sent when the peer is not yet in the recipient's trust store.
  bytes sender_cert = 3;
  // Signed payload bytes (MessageData). The signature covers this field only, not sender_cert.
  bytes data = 4;
  int32 ttl = 5;
};

message SendMessageResponse {
  SendMessageStatus status = 1;
  SignedMessage message = 2;
};

service Message {
  rpc Send(SignedMessage) returns (SendMessageResponse);
  rpc SendAsync(SignedMessage) returns (SendMessageResponse);
  rpc Stream(stream SignedMessage) returns (stream SignedMessage);
  rpc TellMyAddr(google.protobuf.Empty) returns (net.IPAddr);
};
