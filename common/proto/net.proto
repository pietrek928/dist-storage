syntax = "proto3";

package net;

message IPV4Addr {
  bytes addr = 1;
  uint32 port = 2;
};

message IPV6Addr {
  bytes addr = 1;
  uint32 port = 2;
};

message IPAddr {
  oneof addr {
    IPV4Addr ipv4 = 1;
    IPV6Addr ipv6 = 2;
  };
};

message HolePunchParameters {
  IPAddr src = 1;
  IPAddr dst = 2;

  uint64 start_time_ms = 3;

  float connect_sec_start = 4;
  float connect_sec_max = 5;
  float connect_sec_scale = 6;
  uint32 connect_count = 7;
};

message ListenParameters {
  IPV4Addr ipv4 = 1;
  IPV6Addr ipv6 = 2;
};
