syntax = "proto3";

package tracker;

message PolynomialMetricMethod { repeated float coefficients = 1; };

message InverseMetricMethod { float add = 1; };

message LogMetricMethod { repeated float params = 1; };

message ExpMetricMethod { repeated float params = 1; };

message MetricWeightComponent {
  uint32 metric_id = 1;
  oneof method {
    PolynomialMetricMethod polynomial = 2;
    InverseMetricMethod inverse = 3;
    LogMetricMethod log = 4;
    ExpMetricMethod exp = 5;
  }
};

message NodeMetrics {
  bytes node_id = 1;
  uint64 timestamp = 2;
  map<uint32, float> values = 3;
};

message NodeEntry {
  bytes node_id = 1;
  uint64 timestamp = 2;
  float weight = 3;
};

// ----------------- GetServiceMetadata

message ServiceMetadataRequest { string service_name = 1; };

message ServiceMetricsMetadata {
  string service_name = 1;
  string service_tracker_name = 2;
  map<uint32, string> metric_names = 3;
  repeated NodeEntry trackers = 4;
};

// --------------- UpdateMetrics

message UpdateMetricsRequest {
  string service_name = 1;
  NodeMetrics self_metrics = 2;
  repeated NodeMetrics other_node_metrics = 3;
};

// ----------------- GetServiceNodes

message ServiceNodesRequest {
  string service_name = 1;
  uint32 nodes_count = 2;
};

message ServiceNodesResponse {
  repeated NodeEntry nodes = 1;
  repeated NodeEntry trackers = 2;
};

// ----------------- Tracker service

service Tracker {
  rpc GetServiceMetadata(ServiceMetadataRequest)
      returns (ServiceMetricsMetadata);
  rpc UpdateMetrics(UpdateMetricsRequest) returns (google.protobuf.Empty);
  rpc GetServiceNodes(ServiceNodesRequest) returns (ServiceNodesResponse);
};
