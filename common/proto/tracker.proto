syntax = "proto3";

package tracker;


message NodeMetrics {
    bytes node_id = 1;
    uint64 timestamp = 2;
    map<uint32, float> values = 3;
};

message PolynomialMetricMethod {
    repeated float coefficients = 1;
};

message InverseMetricMethod {
    float add = 1;
};

message LogMetricMethod {
    repeated float params = 1;
};

message ExpMetricMethod {
    repeated float params = 1;
};

message MetricWeightComponent {
    uint32 metric_id = 1;
    oneof method {
        PolynomialMetricMethod polynomial = 2;
        InverseMetricMethod inverse = 3;
        LogMetricMethod log = 4;
        ExpMetricMethod exp = 5;
    }
};

message ServiceMetricsMetadata {
    string service_name = 1;
    map <uint32, string> names = 2;
    uint32 num_nodes = 3;
};

message ServiceMetadataRequest {
    string service_name = 1;
};

message NodeEntry {
    bytes node_id = 1;
    uint64 timestamp = 2;
    float weight = 3;
};

message NodesList {
    repeated NodeEntry trackers = 2;
    repeated NodeEntry nodes = 1;
};

message UpdateMetricsRequest {
    string service_name = 1;
    map<uint32, float> values = 2;
    repeated NodeMetrics other_node_metrics = 3;
};

message ServiceNodesRequest {
    string service_name = 1;
};

message ServiceNodesResponse {
    repeated NodeMetrics nodes = 1;
};

service Tracker {
    rpc GetServiceMetadata(ServiceMetadataRequest) returns (ServiceMetricsMetadata);
    rpc UpdateMetrics(UpdateMetricsRequest) returns (google.protobuf.Empty);
    rpc GetServiceNodes(ServiceNodesRequest) returns (ServiceNodesResponse);
};
